<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" role="img" aria-labelledby="title desc">
  <title id="title">Arvaya Discovery Prep — Architecture</title>
  <desc id="desc">Five-agent pipeline (Researcher, SignalExtractor, RiskDetector, PersonalizationWriter, QAVerifier) triggered by a manually supplied lead JSON and writing the brief plus all supporting research into a per-prospect profile folder on disk. Researcher uses Apollo, Anthropic web_search, and Firecrawl.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="arrow-tool" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <style>
      .label { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .title-text { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .section-text { font-size: 12px; font-weight: 600; fill: #475569; letter-spacing: 0.08em; text-transform: uppercase; }
      .box-title { font-size: 15px; font-weight: 600; fill: #0f172a; }
      .box-sub { font-size: 12px; fill: #475569; }
      .pill-text { font-size: 12px; font-weight: 600; fill: #1e3a8a; }
      .pill-sub { font-size: 11px; fill: #1e40af; }
      .edge-text { font-size: 11px; font-weight: 500; fill: #334155; }
      .footer-text { font-size: 12px; fill: #475569; }
    </style>
  </defs>

  <!-- Title -->
  <text x="40" y="40" class="label title-text">Arvaya Discovery Prep — Architecture</text>
  <text x="40" y="62" class="label box-sub">Five-agent pipeline with grounded research and fact verification — manual lead input, profile folder output</text>

  <!-- ──────────────────── ROW 1 — TRIGGER ──────────────────── -->
  <text x="40" y="108" class="label section-text">1 · Input</text>

  <!-- Manual lead JSON -->
  <rect x="40" y="120" width="240" height="64" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="160" y="146" text-anchor="middle" class="label box-title">Lead JSON (manual)</text>
  <text x="160" y="166" text-anchor="middle" class="label box-sub">file or CLI flags</text>

  <!-- Arrow → -->
  <line x1="285" y1="152" x2="365" y2="152" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="325" y="142" text-anchor="middle" class="label edge-text">pnpm prep</text>

  <!-- Orchestrator -->
  <rect x="370" y="120" width="240" height="64" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="490" y="146" text-anchor="middle" class="label box-title">Orchestrator (Node)</text>
  <text x="490" y="166" text-anchor="middle" class="label box-sub">validate · pipeline · persist</text>

  <!-- Arrow → -->
  <line x1="615" y1="152" x2="695" y2="152" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="655" y="142" text-anchor="middle" class="label edge-text">Lead</text>

  <!-- Lead JSON shape -->
  <rect x="700" y="120" width="240" height="64" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="820" y="146" text-anchor="middle" class="label box-title">Lead</text>
  <text x="820" y="166" text-anchor="middle" class="label box-sub">company · AE · meetingAt</text>

  <!-- ──────────────────── ROW 2 — PIPELINE ──────────────────── -->
  <text x="40" y="232" class="label section-text">2 · Pipeline</text>

  <!-- Researcher -->
  <rect x="40" y="244" width="200" height="78" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="140" y="270" text-anchor="middle" class="label box-title">Researcher</text>
  <text x="140" y="290" text-anchor="middle" class="label box-sub">gathers SourcePack</text>
  <text x="140" y="306" text-anchor="middle" class="label box-sub">(only tool-using agent)</text>

  <line x1="245" y1="283" x2="285" y2="283" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="277" text-anchor="middle" class="label edge-text">SourcePack</text>

  <!-- SignalExtractor -->
  <rect x="290" y="244" width="200" height="78" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="390" y="270" text-anchor="middle" class="label box-title">SignalExtractor</text>
  <text x="390" y="290" text-anchor="middle" class="label box-sub">initiatives · pains</text>
  <text x="390" y="306" text-anchor="middle" class="label box-sub">tech_stack · growth</text>

  <!-- RiskDetector (parallel) -->
  <rect x="290" y="332" width="200" height="64" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="390" y="358" text-anchor="middle" class="label box-title">RiskDetector</text>
  <text x="390" y="378" text-anchor="middle" class="label box-sub">layoffs · CFO · breach · legal</text>

  <text x="514" y="298" class="label edge-text">Signals</text>
  <text x="514" y="346" class="label edge-text">Risks</text>

  <line x1="495" y1="283" x2="540" y2="305" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="495" y1="364" x2="540" y2="335" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PersonalizationWriter -->
  <rect x="545" y="280" width="200" height="78" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="645" y="306" text-anchor="middle" class="label box-title">PersonalizationWriter</text>
  <text x="645" y="326" text-anchor="middle" class="label box-sub">icebreakers · hooks</text>
  <text x="645" y="342" text-anchor="middle" class="label box-sub">talking points · objections</text>

  <line x1="750" y1="319" x2="790" y2="319" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="770" y="313" text-anchor="middle" class="label edge-text">DraftBrief</text>

  <!-- QAVerifier -->
  <rect x="795" y="280" width="200" height="78" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="895" y="306" text-anchor="middle" class="label box-title">QAVerifier</text>
  <text x="895" y="326" text-anchor="middle" class="label box-sub">checks each claim against</text>
  <text x="895" y="342" text-anchor="middle" class="label box-sub">cited source snippets</text>

  <line x1="1000" y1="319" x2="1040" y2="319" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1020" y="313" text-anchor="middle" class="label edge-text">VerifiedBrief</text>

  <!-- Profile folder -->
  <rect x="1045" y="280" width="170" height="78" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="1130" y="304" text-anchor="middle" class="label box-title">Profile folder</text>
  <text x="1130" y="322" text-anchor="middle" class="label box-sub">brief.md</text>
  <text x="1130" y="338" text-anchor="middle" class="label box-sub">+ research/*.json</text>
  <text x="1130" y="352" text-anchor="middle" class="label box-sub">on disk</text>

  <!-- Branching connection from Researcher → both extractors -->
  <line x1="240" y1="283" x2="290" y2="283" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="265" y1="283" x2="265" y2="364" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="265" y1="364" x2="285" y2="364" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ──────────────────── ROW 3 — RESEARCHER TOOLS ──────────────────── -->
  <text x="40" y="436" class="label section-text">3 · Researcher tools (only network-touching layer)</text>

  <line x1="140" y1="322" x2="140" y2="448" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3 4"/>
  <line x1="140" y1="448" x2="1100" y2="448" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3 4"/>

  <!-- Apollo company -->
  <rect x="40" y="460" width="220" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="486" text-anchor="middle" class="label pill-text">apollo_company_lookup</text>
  <text x="150" y="504" text-anchor="middle" class="label pill-sub">industry · headcount · funding</text>
  <text x="150" y="520" text-anchor="middle" class="label pill-sub">tech stack · location</text>
  <text x="150" y="534" text-anchor="middle" class="label pill-sub">→ steers search; not a citation</text>
  <line x1="150" y1="448" x2="150" y2="460" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-tool)"/>

  <!-- Apollo people -->
  <rect x="280" y="460" width="220" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="390" y="486" text-anchor="middle" class="label pill-text">apollo_people_search</text>
  <text x="390" y="504" text-anchor="middle" class="label pill-sub">CIO · CTO · CISO · VP Data</text>
  <text x="390" y="520" text-anchor="middle" class="label pill-sub">recent hires (intent signal)</text>
  <line x1="390" y1="448" x2="390" y2="460" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-tool)"/>

  <!-- web_search -->
  <rect x="520" y="460" width="240" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="640" y="486" text-anchor="middle" class="label pill-text">web_search</text>
  <text x="640" y="504" text-anchor="middle" class="label pill-sub">Anthropic-native (server-tool)</text>
  <text x="640" y="520" text-anchor="middle" class="label pill-sub">grounded results · citations native</text>
  <text x="640" y="534" text-anchor="middle" class="label pill-sub">4–8 narrow queries per run</text>
  <line x1="640" y1="448" x2="640" y2="460" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-tool)"/>

  <!-- Firecrawl -->
  <rect x="780" y="460" width="240" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="900" y="486" text-anchor="middle" class="label pill-text">firecrawl_scrape</text>
  <text x="900" y="504" text-anchor="middle" class="label pill-sub">URL → clean markdown</text>
  <text x="900" y="520" text-anchor="middle" class="label pill-sub">interviews · earnings · long posts</text>
  <text x="900" y="534" text-anchor="middle" class="label pill-sub">capped at 5 fetches per run</text>
  <line x1="900" y1="448" x2="900" y2="460" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-tool)"/>

  <!-- ──────────────────── PROFILE FOLDER ──────────────────── -->
  <text x="40" y="586" class="label section-text">4 · Profile folder (the deliverable)</text>
  <rect x="40" y="598" width="1180" height="60" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="60" y="624" class="label box-title">./profiles/&lt;company-slug&gt;/&lt;runId&gt;/</text>
  <text x="60" y="644" class="label box-sub">brief.md  ·  run.json  ·  research/{ sources.json · signals.json · risks.json · draft-brief.json · verified-brief.json }</text>

  <!-- Footer note -->
  <text x="40" y="694" class="label footer-text">All citations use opaque source IDs (src-1, src-2, ...) assigned by the Researcher. Every downstream claim must cite at least one — the QAVerifier removes any claim whose snippet does not actually support it.</text>
</svg>
